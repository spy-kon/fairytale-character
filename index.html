<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨ Παραμυθένιοι Χαρακτήρες</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a0e2e; --parchment: #f5edd6;
  --gold: #c9963a; --gold-light: #e8c06a;
  --magic: #6b3fa0; --magic-glow: #a07ccc;
}
* { box-sizing:border-box; margin:0; padding:0; }
body {
  background:var(--ink); color:var(--parchment);
  font-family:'Crimson Pro',Georgia,serif; font-size:17px;
  min-height:100vh; overflow-x:hidden;
}
body::before {
  content:''; position:fixed; inset:0; z-index:-1;
  background:
    radial-gradient(ellipse at 20% 20%,#2a1a4e 0%,transparent 55%),
    radial-gradient(ellipse at 80% 80%,#1a2a4e 0%,transparent 55%);
}
.stars{position:fixed;inset:0;z-index:-1;pointer-events:none;}
.star{position:absolute;border-radius:50%;background:white;animation:twinkle var(--d,3s) infinite alternate;}
@keyframes twinkle{from{opacity:.1;transform:scale(.8);}to{opacity:.9;transform:scale(1.2);}}

header{text-align:center;padding:2.5rem 1rem 1.5rem;}
.ornament{font-size:.75rem;letter-spacing:.4em;color:var(--gold);opacity:.75;text-transform:uppercase;margin-bottom:.4rem;}
h1{font-family:'Cinzel Decorative',serif;font-size:clamp(1.6rem,4.5vw,2.8rem);font-weight:900;
  background:linear-gradient(135deg,#e8c06a,#c9963a,#d4a830,#e8c06a);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 18px rgba(201,150,58,.4));line-height:1.2;margin-bottom:.4rem;}
.subtitle{font-style:italic;color:var(--magic-glow);font-size:1rem;opacity:.85;}
.divider{color:var(--gold);font-size:1.2rem;letter-spacing:.5rem;margin:.8rem 0;opacity:.45;}

.app{max-width:860px;margin:0 auto;padding:0 1.2rem 3rem;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;}
@media(max-width:620px){.grid{grid-template-columns:1fr;}}

.card{background:rgba(245,237,214,.04);border:1px solid rgba(201,150,58,.2);border-radius:4px;padding:1.5rem;position:relative;}
.card::before,.card::after{content:'✦';position:absolute;color:var(--gold);opacity:.28;font-size:.7rem;}
.card::before{top:.4rem;left:.4rem;}.card::after{bottom:.4rem;right:.4rem;}
.card-title{font-family:'Cinzel Decorative',serif;font-size:.8rem;color:var(--gold-light);text-transform:uppercase;letter-spacing:.14em;margin-bottom:1.2rem;padding-bottom:.65rem;border-bottom:1px solid rgba(201,150,58,.15);}

label{display:block;font-size:.76rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);opacity:.8;margin-bottom:.35rem;margin-top:1rem;}
label:first-of-type{margin-top:0;}
input[type=text],textarea,select{width:100%;background:rgba(245,237,214,.06);border:1px solid rgba(201,150,58,.26);border-radius:2px;color:var(--parchment);font-family:'Crimson Pro',serif;font-size:1rem;padding:.55rem .85rem;outline:none;transition:border-color .25s,background .25s;}
input:focus,textarea:focus,select:focus{border-color:var(--gold);background:rgba(245,237,214,.1);}
textarea{resize:vertical;min-height:80px;line-height:1.6;}
select option{background:#1a0e2e;}

.archetype-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;margin-top:.4rem;}
.arch-btn{cursor:pointer;padding:.55rem .3rem;border:1px solid rgba(201,150,58,.2);border-radius:3px;text-align:center;font-family:'Crimson Pro',serif;font-size:.82rem;color:var(--parchment);opacity:.52;transition:all .22s;background:transparent;line-height:1.25;}
.arch-btn .icon{font-size:1.3rem;display:block;margin-bottom:.15rem;}
.arch-btn:hover{opacity:.9;border-color:var(--gold);}
.arch-btn.active{background:rgba(107,63,160,.28);border-color:var(--magic-glow);color:var(--magic-glow);opacity:1;}

.traits-wrap{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.4rem;}
.trait{cursor:pointer;padding:.28rem .75rem;border:1px solid rgba(201,150,58,.24);border-radius:16px;font-size:.85rem;color:var(--parchment);opacity:.52;transition:all .2s;user-select:none;}
.trait:hover{opacity:.9;border-color:var(--gold);}
.trait.active{background:rgba(201,150,58,.18);border-color:var(--gold-light);color:var(--gold-light);opacity:1;}

.btn-primary{width:100%;margin-top:1.3rem;padding:.85rem 1.5rem;background:linear-gradient(135deg,rgba(201,150,58,.14),rgba(201,150,58,.07));border:1px solid var(--gold);border-radius:2px;color:var(--gold-light);font-family:'Cinzel Decorative',serif;font-size:.88rem;letter-spacing:.1em;cursor:pointer;transition:all .3s;}
.btn-primary:hover{background:linear-gradient(135deg,rgba(201,150,58,.26),rgba(201,150,58,.14));box-shadow:0 0 20px rgba(201,150,58,.2);}
.btn-primary:disabled{opacity:.38;cursor:not-allowed;}
.err{color:#e07070;font-size:.85rem;margin-top:.5rem;font-style:italic;}

/* ── CHARACTER SCREEN ── */
#char-screen{display:none;margin-top:1.5rem;}
.char-header{display:grid;grid-template-columns:auto 1fr;gap:1.5rem;align-items:center;margin-bottom:1.5rem;}
@media(max-width:500px){.char-header{grid-template-columns:1fr;}}
.avatar{width:110px;height:110px;border:2px solid var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:3.2rem;background:radial-gradient(circle,rgba(107,63,160,.22),rgba(26,14,46,.55));flex-shrink:0;position:relative;}
.avatar::after{content:'';position:absolute;inset:-5px;border-radius:50%;border:1px dashed rgba(201,150,58,.28);animation:spin 20s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.char-name{font-family:'Cinzel Decorative',serif;font-size:1.4rem;color:var(--gold-light);margin-bottom:.25rem;}
.char-arch{font-style:italic;color:var(--magic-glow);font-size:.92rem;margin-bottom:.6rem;}
.badges{display:flex;flex-wrap:wrap;gap:.35rem;}
.badge{font-size:.73rem;padding:.18rem .6rem;border-radius:12px;background:rgba(201,150,58,.1);border:1px solid rgba(201,150,58,.26);color:var(--gold-light);}

/* ── CALL BOX ── */
.call-box{background:rgba(107,63,160,.07);border:1px solid rgba(107,63,160,.22);border-radius:4px;padding:2rem;text-align:center;margin-top:1.5rem;}
.call-status{font-family:'Cinzel Decorative',serif;font-size:.88rem;color:var(--magic-glow);letter-spacing:.1em;margin-bottom:1.5rem;min-height:1.4rem;}

.orb-wrap{display:flex;justify-content:center;margin-bottom:1.8rem;}
.orb{width:120px;height:120px;border-radius:50%;position:relative;background:radial-gradient(circle at 40% 35%,#7b4fc0,#3a1a6e);box-shadow:0 0 30px rgba(107,63,160,.5);cursor:pointer;transition:transform .2s;display:flex;align-items:center;justify-content:center;border:2px solid rgba(160,124,204,.4);}
.orb:hover{transform:scale(1.04);}
.orb.listening{animation:orb-pulse 1.2s infinite;box-shadow:0 0 0 0 rgba(160,124,204,.6),0 0 40px rgba(107,63,160,.7);}
.orb.speaking{animation:orb-speak .6s infinite alternate;box-shadow:0 0 40px rgba(201,150,58,.6);background:radial-gradient(circle at 40% 35%,#c9963a,#6b3000);border-color:rgba(201,150,58,.6);}
.orb.idle{opacity:.7;}
.orb.muted{opacity:.5;filter:grayscale(.7);}
@keyframes orb-pulse{0%{box-shadow:0 0 0 0 rgba(160,124,204,.6),0 0 30px rgba(107,63,160,.5);}70%{box-shadow:0 0 0 20px rgba(160,124,204,0),0 0 50px rgba(107,63,160,.8);}100%{box-shadow:0 0 0 0 rgba(160,124,204,0),0 0 30px rgba(107,63,160,.5);}}
@keyframes orb-speak{from{transform:scale(1);box-shadow:0 0 25px rgba(201,150,58,.5);}to{transform:scale(1.07);box-shadow:0 0 55px rgba(201,150,58,.8);}}
.orb-icon{font-size:2.6rem;pointer-events:none;}

.orb-hint{font-size:.88rem;color:var(--parchment);opacity:.55;font-style:italic;margin-bottom:1.5rem;min-height:1.2rem;}

.vol-bars{display:flex;justify-content:center;gap:4px;height:36px;align-items:flex-end;margin-bottom:1.5rem;}
.bar{width:5px;border-radius:3px;background:var(--magic-glow);opacity:.25;transition:height .1s ease,opacity .1s ease;min-height:4px;}
.bar.active{opacity:.85;}

.transcript{background:rgba(0,0,0,.2);border-radius:3px;padding:.8rem 1rem;min-height:60px;max-height:180px;overflow-y:auto;font-size:.95rem;line-height:1.6;text-align:left;color:var(--parchment);opacity:.85;margin-bottom:1.2rem;}
.transcript:empty::before{content:'Η συνομιλία θα εμφανίζεται εδώ…';opacity:.4;font-style:italic;}
.transcript::-webkit-scrollbar{width:2px;}.transcript::-webkit-scrollbar-thumb{background:rgba(160,124,204,.4);}
.t-user{color:#a0c8e8;margin-bottom:.3rem;display:block;}
.t-agent{color:var(--magic-glow);font-style:italic;margin-bottom:.3rem;display:block;}

.call-btns{display:flex;gap:.8rem;justify-content:center;flex-wrap:wrap;}
.btn-end{padding:.6rem 1.5rem;background:rgba(180,60,60,.18);border:1px solid rgba(220,80,80,.38);border-radius:2px;color:#e08080;font-family:'Cinzel Decorative',serif;font-size:.78rem;letter-spacing:.08em;cursor:pointer;transition:all .2s;}
.btn-end:hover{background:rgba(180,60,60,.35);}
.btn-new{padding:.6rem 1.5rem;background:transparent;border:1px solid rgba(245,237,214,.2);border-radius:2px;color:var(--parchment);opacity:.55;font-family:'Crimson Pro',serif;font-size:.9rem;cursor:pointer;transition:all .2s;}
.btn-new:hover{opacity:.9;}
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<header>
  <div class="ornament">✦ Εργαστήριο Φαντασίας ✦</div>
  <h1>Παραμυθένιοι<br>Χαρακτήρες</h1>
  <p class="subtitle">Δώσε ζωή στις φαντασίες σου</p>
  <div class="divider">⁕ ⁕ ⁕</div>
</header>

<div class="app">

  <!-- FORM -->
  <div id="form-screen">
    <div class="grid">
      <div class="card">
        <div class="card-title">✦ Ταυτότητα</div>
        <label>Όνομα Χαρακτήρα</label>
        <input type="text" id="charName" placeholder="π.χ. Αστέρω η Μαγεύτρα…">
        <label>Αρχέτυπο</label>
        <div class="archetype-grid">
          <button class="arch-btn" data-val="Μάγος"><span class="icon">🧙</span>Μάγος</button>
          <button class="arch-btn" data-val="Πριγκίπισσα"><span class="icon">👑</span>Πριγκίπισσα</button>
          <button class="arch-btn" data-val="Δράκος"><span class="icon">🐉</span>Δράκος</button>
          <button class="arch-btn" data-val="Ήρωας"><span class="icon">⚔️</span>Ήρωας</button>
          <button class="arch-btn" data-val="Νεράιδα"><span class="icon">🧚</span>Νεράιδα</button>
          <button class="arch-btn" data-val="Τέρας"><span class="icon">👹</span>Τέρας</button>
          <button class="arch-btn" data-val="Σοφός Γέρος"><span class="icon">🦉</span>Σοφός</button>
          <button class="arch-btn" data-val="Εφευρέτης"><span class="icon">⚙️</span>Εφευρέτης</button>
          <button class="arch-btn" data-val="Μυστηριώδης"><span class="icon">🌒</span>Μυστηριώδης</button>
        </div>
        <label>Κόσμος / Σκηνικό</label>
        <select id="charWorld">
          <option value="enchanted forest">🌲 Μαγικό Δάσος</option>
          <option value="underwater kingdom">🌊 Υποθαλάσσιο Βασίλειο</option>
          <option value="floating sky islands">☁️ Νησιά στα Σύννεφα</option>
          <option value="ancient magical kingdom">🏰 Αρχαίο Μαγικό Βασίλειο</option>
          <option value="dark cursed land">🌑 Σκοτεινή Γη</option>
          <option value="starry cosmos">✨ Αστρικός Κόσμος</option>
        </select>
      </div>

      <div class="card">
        <div class="card-title">✦ Προσωπικότητα</div>
        <label>Χαρακτηριστικά</label>
        <div class="traits-wrap">
          <span class="trait" data-val="γενναίος">γενναίος</span>
          <span class="trait" data-val="σοφός">σοφός</span>
          <span class="trait" data-val="πονηρός">πονηρός</span>
          <span class="trait" data-val="καλόκαρδος">καλόκαρδος</span>
          <span class="trait" data-val="μελαγχολικός">μελαγχολικός</span>
          <span class="trait" data-val="παιχνιδιάρης">παιχνιδιάρης</span>
          <span class="trait" data-val="μυστηριώδης">μυστηριώδης</span>
          <span class="trait" data-val="περήφανος">περήφανος</span>
          <span class="trait" data-val="τρυφερός">τρυφερός</span>
          <span class="trait" data-val="σκληρός">σκληρός</span>
          <span class="trait" data-val="αθώος">αθώος</span>
          <span class="trait" data-val="αδέσμευτος">αδέσμευτος</span>
        </div>
        <label>Επιπλέον στοιχεία (προαιρετικό)</label>
        <textarea id="charExtra" placeholder="π.χ. Μιλά σε ρίμες, κρύβει ένα μυστικό, φοβάται το νερό…"></textarea>
        <button class="btn-primary" id="startBtn" onclick="startConversation()">
          🎙 Μίλα με τον Χαρακτήρα
        </button>
        <div class="err" id="formErr" style="display:none"></div>
      </div>
    </div>
  </div>

  <!-- CHARACTER + CALL SCREEN -->
  <div id="char-screen">
    <div class="card">
      <div class="card-title">✦ Ο Χαρακτήρας Σου</div>
      <div class="char-header">
        <div class="avatar" id="charAvatar">✨</div>
        <div>
          <div class="char-name" id="charNameDisplay"></div>
          <div class="char-arch" id="charArchDisplay"></div>
          <div class="badges" id="charBadges"></div>
        </div>
      </div>

      <div class="call-box">
        <div class="call-status" id="callStatus">Συνδέεται…</div>
        <div class="orb-wrap">
          <div class="orb idle" id="orb" onclick="toggleMic()">
            <span class="orb-icon" id="orbIcon">⏳</span>
          </div>
        </div>
        <div class="orb-hint" id="orbHint">Φορτώνει τον χαρακτήρα…</div>
        <div class="vol-bars">
          <div class="bar" id="b0"></div><div class="bar" id="b1"></div>
          <div class="bar" id="b2"></div><div class="bar" id="b3"></div>
          <div class="bar" id="b4"></div><div class="bar" id="b5"></div>
          <div class="bar" id="b6"></div>
        </div>
        <div class="transcript" id="transcript"></div>
        <div class="call-btns">
          <button class="btn-end" onclick="endCall()">⏹ Τέλος Συνομιλίας</button>
          <button class="btn-new" onclick="newCharacter()">↩ Νέος Χαρακτήρας</button>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- ElevenLabs SDK via CDN -->
<script src="https://cdn.jsdelivr.net/npm/@elevenlabs/client/dist/index.umd.js"></script>
<script>
const AGENT_ID = 'agent_2301kneeqw6jem195f14a1avjenh';

const ICONS = {'Μάγος':'🧙','Πριγκίπισσα':'👑','Δράκος':'🐉','Ήρωας':'⚔️','Νεράιδα':'🧚','Τέρας':'👹','Σοφός Γέρος':'🦉','Εφευρέτης':'⚙️','Μυστηριώδης':'🌒'};

const FIRST_MSG = {
  'Μάγος':       'Προσέγγισε, αν τολμάς… Τι ζητάς από τον μάγο;',
  'Πριγκίπισσα': 'Ω! Ένας επισκέπτης! Χαίρομαι που ήρθες στο βασίλειό μου.',
  'Δράκος':      '*βαθύ γρύλισμα* Ποιος ενοχλεί τον ύπνο μου;',
  'Ήρωας':       'Σύντροφε! Χαίρομαι που σε βλέπω. Τι χρειάζεσαι;',
  'Νεράιδα':     '*σκορπίζει σπίθες* Γεια σου! Τι ευχή θέλεις σήμερα;',
  'Τέρας':       '*βογγητό* Τι θέλεις… μίλα.',
  'Σοφός Γέρος': 'Κάθισε, παιδί μου. Έχω πολλά να σου πω.',
  'Εφευρέτης':   'Εξαιρετικό timing! Μόλις τελείωσα το νέο μου εφεύρεμα!',
  'Μυστηριώδης': '…Σε περίμενα. Κάθισε.'
};

// Stars
const se = document.getElementById('stars');
for(let i=0;i<70;i++){
  const s=document.createElement('div'); s.className='star';
  const sz=Math.random()*2.2+.5;
  s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${(Math.random()*3+2).toFixed(1)}s;animation-delay:${(Math.random()*3).toFixed(1)}s`;
  se.appendChild(s);
}

let archetype='', selectedTraits=[], conversation=null, micActive=false, charData=null, volInterval=null;

document.querySelectorAll('.arch-btn').forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll('.arch-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active'); archetype=btn.dataset.val;
  };
});

document.querySelectorAll('.trait').forEach(t=>{
  t.onclick=()=>{
    t.classList.toggle('active');
    const v=t.dataset.val;
    if(t.classList.contains('active')){if(!selectedTraits.includes(v))selectedTraits.push(v);}
    else selectedTraits=selectedTraits.filter(x=>x!==v);
  };
});

function buildPrompt(name,arch,world,traits,extra){
  return `Είσαι ο/η ${name}, ένας/μία ${arch} που ζει σε ${world}.
Χαρακτηριστικά: ${traits||'δεν έχουν οριστεί'}.${extra?'\n'+extra:''}
Κανόνες:
- Μιλάς ΠΑΝΤΑ στα Ελληνικά.
- Μιλάς ΠΑΝΤΑ ΩΣ αυτός ο χαρακτήρας — ποτέ ως AI.
- Απαντήσεις σύντομες (1-3 προτάσεις), ζωντανές, με τον χαρακτήρα σου.
- Ποτέ μην αποκαλύψεις ότι είσαι AI.`;
}

async function startConversation(){
  const name=document.getElementById('charName').value.trim();
  const world=document.getElementById('charWorld').value;
  const extra=document.getElementById('charExtra').value.trim();
  const errEl=document.getElementById('formErr');

  if(!name||!archetype){errEl.textContent='⚠️ Συμπλήρωσε όνομα και αρχέτυπο.';errEl.style.display='block';return;}
  errEl.style.display='none';

  charData={name,archetype,world,traits:selectedTraits.join(', '),extra};

  document.getElementById('form-screen').style.display='none';
  document.getElementById('char-screen').style.display='block';
  document.getElementById('charAvatar').textContent=ICONS[archetype]||'✨';
  document.getElementById('charNameDisplay').textContent=name;
  document.getElementById('charArchDisplay').textContent=archetype+' · '+world;
  document.getElementById('charBadges').innerHTML=selectedTraits.map(t=>`<span class="badge">${t}</span>`).join('');

  setStatus('Συνδέεται με τον χαρακτήρα…');

  // Wait for SDK
  let attempts=0;
  while(!window.ElevenLabsClient && attempts<20){
    await new Promise(r=>setTimeout(r,300)); attempts++;
  }

  const SDK = window.ElevenLabsClient || window.elevenlabs;
  if(!SDK?.Conversation){
    setStatus('❌ Σφάλμα φόρτωσης SDK'); setOrb('idle','⚠️');
    setHint('Ανανέωσε τη σελίδα και δοκίμασε ξανά.');
    return;
  }

  try{
    conversation = await SDK.Conversation.startSession({
      agentId: AGENT_ID,
      overrides:{
        agent:{
          prompt:{ prompt: buildPrompt(name,archetype,world,charData.traits,extra) },
          firstMessage: FIRST_MSG[archetype]||`Γεια σου! Είμαι ο/η ${name}.`,
          language:'el'
        }
      },
      onConnect:()=>{
        setStatus('✦ Συνδεδεμένος — Μίλα!');
        setOrb('listening','🎙'); setHint('Μίλα στον χαρακτήρα…');
        micActive=true; startVolBars();
      },
      onDisconnect:()=>{
        setStatus('Η συνομιλία τελείωσε');
        setOrb('idle','🌙'); setHint(''); stopVolBars();
      },
      onMessage:({source,message})=>{
        if(message?.trim()) addTranscript(source==='user'?'user':'agent', message);
      },
      onModeChange:({mode})=>{
        if(mode==='speaking'){setOrb('speaking','🔊');setHint(`${name} μιλά…`);}
        else{setOrb('listening','🎙');setHint('Μίλα στον χαρακτήρα…');}
      },
      onError:(e)=>{
        console.error(e); setStatus('❌ Σφάλμα σύνδεσης');
        setOrb('idle','⚠️'); setHint(String(e?.message||e||''));
      }
    });
  }catch(e){
    console.error(e);
    setStatus('❌ Αποτυχία σύνδεσης');
    setOrb('idle','⚠️');
    setHint(e?.message||'Έλεγξε το Agent ID και τα permissions.');
  }
}

function toggleMic(){
  if(!conversation) return;
  micActive=!micActive;
  conversation.setMicMuted(!micActive);
  if(micActive){setOrb('listening','🎙');setHint('Μίλα στον χαρακτήρα…');}
  else{setOrb('muted','🔇');setHint('Μικρόφωνο σε σίγαση — πάτα για επανενεργοποίηση');}
}

async function endCall(){
  if(conversation){try{await conversation.endSession();}catch(e){} conversation=null;}
  stopVolBars(); micActive=false;
  setStatus('Η συνομιλία τελείωσε'); setOrb('idle','🌙'); setHint('');
}

async function newCharacter(){
  await endCall();
  document.getElementById('char-screen').style.display='none';
  document.getElementById('form-screen').style.display='block';
  document.getElementById('transcript').innerHTML='';
  document.getElementById('charName').value='';
  document.getElementById('charExtra').value='';
  archetype=''; selectedTraits=[];
  document.querySelectorAll('.arch-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.trait').forEach(t=>t.classList.remove('active'));
  window.scrollTo({top:0,behavior:'smooth'});
}

function setStatus(m){document.getElementById('callStatus').textContent=m;}
function setHint(m){document.getElementById('orbHint').textContent=m;}
function setOrb(state,icon){
  document.getElementById('orb').className=`orb ${state}`;
  document.getElementById('orbIcon').textContent=icon;
}
function addTranscript(role,text){
  const el=document.getElementById('transcript');
  const line=document.createElement('span');
  line.className=role==='user'?'t-user':'t-agent';
  line.textContent=(role==='user'?'🧑 ':(ICONS[charData?.archetype]||'✨')+' ')+text;
  el.appendChild(line); el.scrollTop=el.scrollHeight;
}
function startVolBars(){
  const bars=document.querySelectorAll('.bar');
  volInterval=setInterval(()=>{
    const orb=document.getElementById('orb');
    const active=orb.classList.contains('listening')||orb.classList.contains('speaking');
    bars.forEach(b=>{
      b.style.height=(active?Math.random()*28+4:4)+'px';
      b.classList.toggle('active',active);
    });
  },120);
}
function stopVolBars(){
  clearInterval(volInterval);
  document.querySelectorAll('.bar').forEach(b=>{b.style.height='4px';b.classList.remove('active');});
}
</script>
</body>
</html>
